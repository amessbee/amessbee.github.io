bio: "
Dr. Mudassir Shabbir is an Associate Professor in the Department of Computer Science at the Lahore University of Management Sciences (LUMS), Pakistan. He earned his Ph.D. from the Division of Computer Science at Rutgers University, NJ, USA, in 2014, where he was a Fulbright Scholar and Rutgers Honors Fellow (2011–12).

Prior to joining LUMS in 2026, Dr. Shabbir was at the Information Technology University (ITU), Lahore, where he served as Associate Professor and Chairperson of the Department of Computer Science. He has also held positions as Research Assistant Professor at Vanderbilt University, Nashville, TN, and has contributed at Los Alamos National Laboratory (NM) and Bloomberg L.P. (New York, NY).

His primary research focus is Graph Machine Learning and Robustness in Networks, with applications in brain network analysis (fMRI data), social network analysis, and Resilient Network Systems. His work on succinct representations of large datasets has direct applications in non-parametric statistical analysis, drawing on techniques from algorithmic and discrete geometry."